aid: brightspace
url: https://raw.githubusercontent.com/api-evangelist/brightspace/refs/heads/main/apis.yml
name: D2L Brightspace
kind: company
description: >-
  D2L Brightspace is an enterprise learning management system (LMS) used by
  higher education, K-12, and corporate organizations. Its public REST API is
  the Valence Learning Framework API, exposed under https://{host}/d2l/api/ and
  split into two product components - "lp" (Learning Platform - users, roles,
  enrollments, org units, data hub) and "le" (Learning Environment - content,
  grades, assignments/dropbox, quizzes, discussions, calendar, news, learning
  outcomes). Routes are versioned per component (for example lp 1.x and le 1.x)
  and authenticated with OAuth 2 bearer tokens issued by the D2L auth service;
  the older ID-Key (app-id/user-id) scheme is deprecated. D2L is the vendor;
  Valence is the historical name of the API framework.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- LMS
- Learning Management System
- EdTech
- Education
- Valence
- D2L
- Brightspace
created: '2026-07-03'
modified: '2026-07-03'
specificationVersion: '0.19'
