description: >-
  FinOps view of D2L Brightspace spend. Brightspace is licensed to institutions
  under an annual enterprise subscription rather than metered API usage, so the
  Valence Learning Framework API carries no direct per-call cost - it is a
  capability included with the platform license. The dominant cost drivers are
  the institutional subscription itself (sized by FTE / enrolled learners and
  edition), optional add-on modules such as Brightspace Data Sets / Data Hub and
  analytics packages, and implementation, migration, and integration services.
  For teams building on the API, the internal cost is primarily engineering and
  the compute/storage used to run and operate integrations and any downstream
  data warehouse fed by Data Hub exports, not a usage invoice from D2L.
notes: >-
  D2L does not publish public rate cards; all pricing is contract-based. There
  is no usage-metered API billing to allocate, so FinOps effort centers on
  license/edition selection, add-on module ROI, and controlling the internal
  engineering and infrastructure cost of integrations. Reconcile actual contract
  terms with D2L.
