publisherName: D2L
serviceCategory: Education Technology and Learning Management
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
meters:
- name: platform_subscription
  description: Annual Brightspace institutional subscription, sized by FTE / enrolled learners and edition. Not API-metered.
  unit: contract
  aggregation: sum
  dimensions:
  - institution
  - edition
- name: data_hub_addon
  description: Optional Brightspace Data Sets / Data Hub licensing for bulk institutional data and analytics.
  unit: contract
  aggregation: sum
  dimensions:
  - institution
- name: integration_compute
  description: Internal compute and storage cost of running Valence API integrations and any data warehouse fed by Data Hub exports (no D2L invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - integration
  - environment
principles:
- name: Visibility
  description: Track the institutional subscription and any Data Hub / analytics add-ons as fixed annual line items; monitor internal engineering and infrastructure spend for integrations separately since the API itself is not metered.
- name: Allocation
  description: Attribute the Brightspace subscription and add-ons to the institution or business unit, and map integration/warehouse infrastructure costs to the teams that own each integration.
- name: Optimization
  description: Right-size the edition and add-on modules to actual need; use Data Hub bulk exports instead of chatty REST polling to reduce integration compute; retire unused API applications and scheduled jobs.
- name: Accountability
  description: Assign an owner for the D2L contract renewal and for each API integration; review add-on module utilization and integration infrastructure cost against value delivered each cycle.
