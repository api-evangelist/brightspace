aid: brightspace
name: D2L Brightspace
review:
  question: Does Brightspace expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Brightspace's public developer surface -
    the Valence Learning Framework API - is entirely request/response REST over
    HTTPS under https://{host}/d2l/api/. There is no documented server-push
    transport (WebSocket or Server-Sent Events) on the Valence API to model.
    Bulk and near-real-time data movement is handled instead by the Data Hub /
    Data Export Framework, which produces asynchronous export jobs (CSV/ZIP
    files) and Brightspace Data Sets extracts that clients poll for and
    download - a file-based batch mechanism, not a streaming transport.
findings:
  summary: |
    D2L Brightspace does not publish a documented public WebSocket API. Its
    public API is the Valence Learning Framework API, a versioned REST API
    served from each institution's own Brightspace host under
    https://{host}/d2l/api/. Routes are split across two product components -
    "lp" (Learning Platform: users, roles, enrollments, org units, Data Hub)
    and "le" (Learning Environment: content, grades, assignments/dropbox,
    quizzes, discussions, calendar, news, learning outcomes) - each
    independently versioned (for example lp 1.x and le 1.x). Authentication
    uses OAuth 2 bearer tokens issued by the D2L auth service via the
    authorization code grant; the legacy ID-Key (app-id/user-id signed URL)
    scheme is deprecated. Every documented route is request/response HTTPS
    REST. No realtime, bidirectional, or streaming WebSocket (ws:// or wss://)
    endpoint is documented anywhere in the Valence reference. Large-scale data
    access is provided through the Data Hub / Data Export Framework as
    asynchronous file exports, not a push stream.
  openSource: |
    The Valence API itself is a proprietary capability of the licensed
    Brightspace platform, not an open-source server. D2L does publish
    open-source client tooling and examples on GitHub (github.com/Brightspace),
    including SDKs and a Data Hub client example, but the LMS and its API
    implementation are commercial.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://{host}/d2l/api
      documented: true
      note: Valence Learning Framework API. lp (Learning Platform) and le (Learning Environment) components, each independently versioned.
    - protocol: Batch Export
      scheme: https
      documented: true
      note: Data Hub / Data Export Framework and Brightspace Data Sets produce asynchronous CSV/ZIP exports the client polls for and downloads. File-based batch, not server push.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the Valence API reference as of the review date.
