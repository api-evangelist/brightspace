actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on the Valence API, and no server-push
    transport (WebSocket or SSE) is documented, so no AsyncAPI document was
    created. Brightspace's public API is request/response REST; near-real-time
    and bulk data movement is handled by the Data Hub / Data Export Framework as
    asynchronous file exports, which carry no streaming protocol to model.
